<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div id="display"></div>
    <div id="bottom">
        <span id="unlock">UNLOCK</span>
        <span id="reset">RESET</span>
    </div>
</body>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;

    }

    [unlock] #display>*>*:nth-child(4)::after {
        content: "▼";
    }

    body {
        margin: 0;
    }

    #display>*>*,
    #reset,
    #unlock {
        border: 1px solid black;
    }

    #display {
        height: 90vh;
        display: flex;

        &>* {
            flex: 1;
            display: grid;
            grid-template-rows: 0.3fr 1fr 2fr 1fr;
            height: 100%;
            text-align: center;
            align-items: center;

            /* Internal horizontal borders between the text/buttons inside a column */
            &>* {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            &>:nth-child(1) {
                font-size: 3vh;
            }

            &>:nth-child(3) {
                font-size: 16vh;
            }

            &>:nth-child(2)::after {
                content: "▲";
            }

            &>:nth-child(4)::after {
                content: "🔒";
            }

            &>:is(:nth-child(2), :nth-child(4)) {
                font-size: 10vh;
            }
        }

    }


    #bottom {
        height: 10vh;
        display: flex;
    }

    #reset,
    #unlock {
        display: flex;
        flex: 1;
        /* Changed to flex for perfect vertical alignment with border */
        align-items: center;
        justify-content: center;
        font-size: 5vh;
    }

    body:not([unlock]) #reset {

        &::after,
        &::before {
            content: "🔒";
        }
    }
</style>
<script>
    const counters = [
        init_counter("ラーメン"),
        init_counter("チーズ"),
        init_counter("追い辛"),
        init_counter("豆乳"),
        init_counter("ドリンク"),
    ];

    unlock.addEventListener("touchstart", e => {
        e.preventDefault();
        document.body.setAttribute("unlock", "")
    });
    unlock.addEventListener("touchend", e => {
        e.preventDefault();
        document.body.removeAttribute("unlock")
    });
    unlock.addEventListener("touchcancel", e => {
        e.preventDefault();
        document.body.removeAttribute("unlock")
    });
    counters.forEach(counter => display.appendChild(counter));
    reset.onclick = e => {
        if (is_unlocked()) {
            counters.forEach(c => c.reset());
        }
    }

    try {
        const data = JSON.parse(localStorage.data);
        counters.forEach((c, i) => c.set(data[i] ?? 0));
    } catch (_) {
        localStorage.removeItem("data");
        reset.onclick();
    }

    function create_div() {
        return document.createElement("div");
    }
    function init_counter(name) {
        let counter_elm = create_div();
        let label_elm = create_div();
        let up_button_elm = create_div();
        let counter_display_elm = create_div();
        let down_button_elm = create_div();

        counter_elm.appendChild(label_elm);
        counter_elm.appendChild(up_button_elm);
        counter_elm.appendChild(counter_display_elm);
        counter_elm.appendChild(down_button_elm);

        counter_elm.value = () => +counter_display_elm.innerText;
        counter_elm.set = value => {
            counter_display_elm.innerText = value
            store_data();
        }
        counter_elm.inc = () => {
            counter_elm.set(counter_elm.value() + 1);
        }
        counter_elm.dec = () => {
            counter_elm.set(counter_elm.value() - 1);
        }
        counter_elm.reset = () => counter_elm.set(0);

        label_elm.innerText = name;
        up_button_elm.onclick = counter_elm.inc;
        down_button_elm.onclick = e => {
            if (is_unlocked()) {
                counter_elm.dec();
            }
        }

        return counter_elm;
    }
    function store_data() {
        const data = counters.map(x => x.value());
        localStorage.data = JSON.stringify(data);
    }
    function is_unlocked() {
        return document.body.hasAttribute("unlock");
    }
</script>

</html>
